name: flutter_application_1
description: "Hayatify: AR Drawing - Profesyonel Tasarım Modu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ DİL DESTEĞİ (Localization)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # ✅ AÇILIŞ EKRANI
  flutter_native_splash: ^2.4.0

  # ✅ SESLİ KOMUT & İZİNLER
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1

  # 🎨 UI & TASARIM
  confetti: ^0.8.0
  device_preview: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.1.0
  wakelock_plus: ^1.1.0
  flutter_staggered_animations: ^1.0.0
  lottie: ^3.1.2

  # 📸 KAMERA & DEPOLAMA
  camera: ^0.10.5+9
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # 📲 MEDYA & PAYLAŞIM
  image_picker: ^1.0.7
  vector_math: ^2.1.4
  screenshot: ^3.0.0
  share_plus: ^10.1.0

  # 👓 AR & ABONELİK
  ar_flutter_plugin_plus: 1.1.3
  arkit_plugin: ^1.0.6
  purchases_flutter: ^9.12.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

# 🖼️ MAĞAZA İKONLARI
flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icons/android-icon.png"
  image_path_ios: "assets/icons/ios-icon.png"

# 🚀 NATIVE SPLASH AYARLARI (Siyah ekranı bitiren kısım)
flutter_native_splash:
  color: "#1E293B" # Kendi SplashScreen temanla birebir aynı
  android: true
  ios: true
  fullscreen: true
  android_12:
    color: "#1E293B"

flutter:
  uses-material-design: true
  generate: true # ✅ Dil dosyalarının otomatik üretilmesi için kritik

  shaders:
    - assets/shaders/sketch.frag

  assets:
    - assets/images/splash.jpg
    - assets/categories/
    - assets/tutorial/
    - assets/icons/
    # Şablonlar
    - assets/templates/animals/
    - assets/templates/cars/
    - assets/templates/anime/
    - assets/templates/cartoon/
    - assets/templates/flowers/
    - assets/templates/human/
    - assets/templates/nature/
    # 3D Modeller
    - assets/models/animals/
    - assets/models/cars/
    - assets/models/anime/
    - assets/models/cartoon/
    - assets/models/flowers/
    - assets/models/human/
    - assets/models/nature/

dependency_overrides:
  permission_handler: ^12.0.1
  http: ^1.1.0